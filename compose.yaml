services:
  ocado-automation:
    image: ghcr.io/zapthedingbat/ocado-automation:latest
    container_name: ocado-automation
    environment:
      - NODE_ENV=production
      - PORT=3000
      - OCADO_API_KEY=${OCADO_API_KEY}
      - OCADO_HEADLESS=true
      - OCADO_EMAIL=${OCADO_EMAIL}
      - OCADO_PASSWORD=${OCADO_PASSWORD}
      - OCADO_STORAGE_STATE_PATH=/data/ocado-storage.json
    ports:
      - "3000:3000"
    shm_size: "1gb"
    volumes:
      - ocado-automation-data:/data
    restart: unless-stopped

volumes:
  ocado-automation-data:
